services:
  banana-import:
    build: .
    ports:
      - "127.0.0.1:8500:8500"
    env_file:
      - .env
    volumes:
      # Persist per-client learned vendor→account maps across rebuilds.
      - ./data:/app/data
    extra_hosts:
      # Lets the container reach the Banana webserver on the host (live chart of accounts).
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
