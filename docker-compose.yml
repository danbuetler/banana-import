services:
  banana-import:
    build: .
    ports:
      - "127.0.0.1:8500:8500"
    env_file:
      - .env
    volumes:
      # Persist per-client learned vendor→account maps across rebuilds.
      - ./data:/app/data
    extra_hosts:
      # Lets the container reach the Banana webserver on the host (live chart of accounts).
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "autoheal=true"   # restarted by the shared autoheal sidecar when unhealthy
    healthcheck:  # detects a stale ExFAT mount (os.listdir throws) AND an app hang
      test: ["CMD-SHELL", "python -c \"import os,sys,urllib.request; os.listdir('/app/data'); sys.exit(0 if urllib.request.urlopen('http://localhost:8500/api/version',timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
